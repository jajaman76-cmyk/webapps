// ── 유틸 ──────────────────────────────────────────────────────────
const fmtN = n=>n>=1e6?(n/1e6).toFixed(1)+"M":n>=1000?(n/1000).toFixed(1)+"K":String(n);
const isShorts = v=>v.duration<=60&&v.duration>0||/shorts|쇼츠/i.test(v.title);
const engRate = v=>v.viewCount>0?(((v.likeCount+v.commentCount)/v.viewCount)*100).toFixed(2):"0.00";
const STOP=["이","그","저","은","는","가","을","를","의","에","와","과","도","로","으로","에서","하고","하는","있는","없는","대한","위한","통한","shorts","Shorts","쇼츠","이유","진짜","지금","하면","되는","안되","이번","이런","어떻게","무엇","언제","왜"];

function parseDur(iso){const m=iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);if(!m)return 0;return(+m[1]||0)*3600+(+m[2]||0)*60+(+m[3]||0)}
function fmtDur(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;return h?`${h}:${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`:`${m}:${String(sec).padStart(2,"0")}`}
function dow(d){return["일","월","화","수","목","금","토"][new Date(d).getDay()]}
function topWords(titles){
  const f={};
  titles.forEach(t=>t.replace(/[^가-힣a-zA-Z0-9\s]/g,"").split(/\s+/).forEach(w=>{if(w.length>=2&&!STOP.includes(w))f[w]=(f[w]||0)+1}));
  return Object.entries(f).sort((a,b)=>b[1]-a[1]).slice(0,20);
}

// ── API ───────────────────────────────────────────────────────────
async function getChannelId(key,input){
  let decoded=input.trim();
  try{decoded=decodeURIComponent(decoded);}catch(e){}

  const cm=decoded.match(/\/channel\/(UC[\w-]+)/);
  if(cm)return cm[1];

  let handle=null;
  const atFull=decoded.match(/@([^\s\/?&]+)/);
  if(atFull)handle=atFull[1];
  else if(decoded.startsWith("@"))handle=decoded.slice(1);

  if(handle){
    let r=await fetch(`https://www.googleapis.com/youtube/v3/channels?part=id&forHandle=${encodeURIComponent(handle)}&key=${key}`);
    let d=await r.json();
    if(!d.error&&d.items?.length)return d.items[0].id;
    r=await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=channel&q=${encodeURIComponent(handle)}&maxResults=1&key=${key}`);
    d=await r.json();
    if(d.error)throw new Error(d.error.message);
    if(d.items?.length)return d.items[0].id.channelId;
  }

  const cm2=decoded.match(/\/c\/([^\s\/?&]+)/);
  if(cm2){
    const r=await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=channel&q=${encodeURIComponent(cm2[1])}&maxResults=1&key=${key}`);
    const d=await r.json();
    if(d.items?.length)return d.items[0].id.channelId;
  }

  throw new Error("채널을 찾을 수 없어요. @핸들 또는 채널 URL을 확인해주세요.");
}

async function getChannelInfo(key,id){
  const r=await fetch(`https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics,brandingSettings,contentDetails&id=${id}&key=${key}`);
  const d=await r.json();
  if(d.error)throw new Error(d.error.message);
  if(!d.items?.length)throw new Error("채널 정보를 가져올 수 없어요.");
  const c=d.items[0];
  return{
    id,title:c.snippet.title,description:c.snippet.description,
    thumbnail:c.snippet.thumbnails?.medium?.url,
    subscriberCount:+c.statistics.subscriberCount||0,
    videoCount:+c.statistics.videoCount||0,
    viewCount:+c.statistics.viewCount||0,
    createdAt:c.snippet.publishedAt,country:c.snippet.country||"미상",
    keywords:c.brandingSettings?.channel?.keywords||"",
    uploadPlaylistId:c.contentDetails?.relatedPlaylists?.uploads,
  };
}

async function getAllVideos(key,plId,onProg){
  let vids=[],token="",page=0;
  do{
    const r=await fetch(`https://www.googleapis.com/youtube/v3/playlistItems?part=snippet,contentDetails&playlistId=${plId}&maxResults=50&pageToken=${token}&key=${key}`);
    const d=await r.json();
    if(d.error)throw new Error(d.error.message);
    vids.push(...(d.items||[]).map(i=>({id:i.contentDetails.videoId,title:i.snippet.title,publishedAt:i.contentDetails.videoPublishedAt||i.snippet.publishedAt,thumbnail:i.snippet.thumbnails?.medium?.url||i.snippet.thumbnails?.default?.url,description:i.snippet.description})));
    token=d.nextPageToken||"";page++;
    onProg(`영상 목록 수집 중... ${vids.length}개`);
  }while(token&&page<20);

  const details=[];
  for(let i=0;i<vids.length;i+=50){
    const ids=vids.slice(i,i+50).map(v=>v.id).join(",");
    const r=await fetch(`https://www.googleapis.com/youtube/v3/videos?part=statistics,contentDetails,snippet&id=${ids}&key=${key}`);
    const d=await r.json();
    if(d.error)throw new Error(d.error.message);
    details.push(...(d.items||[]));
    onProg(`상세 정보 수집 중... ${Math.min(i+50,vids.length)}/${vids.length}`);
  }

  const dm={};details.forEach(d=>{dm[d.id]=d});
  return vids.map(v=>{
    const det=dm[v.id];
    const dur=det?parseDur(det.contentDetails?.duration||"PT0S"):0;
    return{...v,duration:dur,durationStr:fmtDur(dur),
      viewCount:+(det?.statistics?.viewCount||0),
      likeCount:+(det?.statistics?.likeCount||0),
      commentCount:+(det?.statistics?.commentCount||0),
      tags:det?.snippet?.tags||[],
      titleLength:v.title.length,
      dayOfWeek:dow(v.publishedAt),
      month:v.publishedAt?.slice(0,7)||"",
    };
  }).filter(v=>v.title!=="Private video"&&v.title!=="Deleted video");
}

// ── 분석 ──────────────────────────────────────────────────────────
function analyze(videos){
  const shorts=videos.filter(isShorts),longs=videos.filter(v=>!isShorts(v));
  const topByViews=[...videos].sort((a,b)=>b.viewCount-a.viewCount).slice(0,10);
  const bottomByViews=[...videos].sort((a,b)=>a.viewCount-b.viewCount).slice(0,5);
  const topEng=[...videos].sort((a,b)=>+engRate(b)-+engRate(a)).slice(0,10);
  const dayCount={"월":0,"화":0,"수":0,"목":0,"금":0,"토":0,"일":0};
  videos.forEach(v=>{if(dayCount[v.dayOfWeek]!==undefined)dayCount[v.dayOfWeek]++});
  const dayViews={};
  videos.forEach(v=>{if(!dayViews[v.dayOfWeek])dayViews[v.dayOfWeek]={total:0,count:0};dayViews[v.dayOfWeek].total+=v.viewCount;dayViews[v.dayOfWeek].count++});
  const bestDay=Object.entries(dayViews).sort((a,b)=>(b[1].total/b[1].count)-(a[1].total/a[1].count))[0];
  const tagFreq={};
  videos.forEach(v=>v.tags.forEach(t=>{tagFreq[t]=(tagFreq[t]||0)+1}));
  const topTags=Object.entries(tagFreq).sort((a,b)=>b[1]-a[1]).slice(0,20);
  const allWords2=topWords(videos.map(v=>v.title));
  const topWords10=topWords(topByViews.map(v=>v.title));
  const avg=arr=>arr.length?Math.round(arr.reduce((s,v)=>s+v.viewCount,0)/arr.length):0;
  return{
    total:videos.length,shorts,longs,topByViews,bottomByViews,topEng,
    dayCount,dayViews,bestDay,topTags,allWords:allWords2,topWords10,
    avgShortsViews:avg(shorts),avgLongsViews:avg(longs),
    avgViews:avg(videos),
    avgTitleLen:Math.round(videos.reduce((s,v)=>s+v.titleLength,0)/videos.length),
    avgShortsTitleLen:shorts.length?Math.round(shorts.reduce((s,v)=>s+v.titleLength,0)/shorts.length):0,
    avgLongsTitleLen:longs.length?Math.round(longs.reduce((s,v)=>s+v.titleLength,0)/longs.length):0,
    hashtagVideos:videos.filter(v=>/#\S+/.test(v.title)),
    totalViews:videos.reduce((s,v)=>s+v.viewCount,0),
    totalLikes:videos.reduce((s,v)=>s+v.likeCount,0),
    totalComments:videos.reduce((s,v)=>s+v.commentCount,0),
    avgEngRate:(videos.reduce((s,v)=>s+parseFloat(engRate(v)),0)/videos.length).toFixed(2),
  };
}

// ── 영상 개별 분석 (대본+댓글+스탯) ─────────────────────────────
async function fetchVideoDetail(key, url) {
  const vidMatch = url.match(/(?:v=|youtu\.be\/)([\w-]{11})/);
  if (!vidMatch) throw new Error("올바른 유튜브 영상 URL이 아니에요: " + url);
  const vid = vidMatch[1];
  const r = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics,contentDetails&id=${vid}&key=${key}`);
  const d = await r.json();
  if (d.error) throw new Error(d.error.message);
  if (!d.items?.length) throw new Error("영상을 찾을 수 없어요: " + url);
  const v = d.items[0];
  return {
    id: vid,
    title: v.snippet.title,
    description: v.snippet.description,
    publishedAt: v.snippet.publishedAt?.slice(0,10),
    tags: v.snippet.tags || [],
    duration: parseDur(v.contentDetails?.duration||"PT0S"),
    viewCount: +v.statistics.viewCount||0,
    likeCount: +v.statistics.likeCount||0,
    commentCount: +v.statistics.commentCount||0,
    thumbnail: v.snippet.thumbnails?.medium?.url,
  };
}

async function fetchComments(key, videoId, maxPages=3) {
  let comments=[], token="", page=0;
  do {
    const r = await fetch(`https://www.googleapis.com/youtube/v3/commentThreads?part=snippet&videoId=${videoId}&maxResults=100&order=relevance&pageToken=${token}&key=${key}`);
    const d = await r.json();
    if (d.error) break;
    (d.items||[]).forEach(item => {
      const c = item.snippet.topLevelComment.snippet;
      comments.push({
        text: c.textDisplay,
        likeCount: c.likeCount||0,
        author: c.authorDisplayName,
      });
    });
    token = d.nextPageToken||""; page++;
  } while(token && page < maxPages);
  return comments;
}

function analyzeComments(comments) {
  const sorted = [...comments].sort((a,b)=>b.likeCount-a.likeCount);
  const wordFreq = {};
  comments.forEach(c => {
    c.text.replace(/<[^>]+>/g,"").replace(/[^가-힣a-zA-Z0-9\s]/g," ").split(/\s+/).forEach(w => {
      if(w.length>=2 && !["이","그","저","은","는","이","가","을","를","의","에","와","과","도","ㅋㅋ","ㅎㅎ","진짜","정말","너무","그냥"].includes(w))
        wordFreq[w]=(wordFreq[w]||0)+1;
    });
  });
  const topWords = Object.entries(wordFreq).sort((a,b)=>b[1]-a[1]).slice(0,20);
  return { total: comments.length, top10: sorted.slice(0,10), topWords };
}

    setKeyStatus("loading");
    try{
      const r=await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=channel&q=test&maxResults=1&key=${apiKey.trim()}`);
      const d=await r.json();
      if(d.error&&d.error.code!==403){setKeyStatus("error");return;}
      // 403도 키가 존재한다는 뜻(권한 제한)이므로 통과
      setSavedKey(apiKey.trim());setKeyStatus("success");
    }catch{
      // 네트워크 에러여도 키 입력값이 있으면 일단 저장 (로컬 파일 제한 우회)
      if(apiKey.trim().startsWith("AIza")&&apiKey.trim().length>30){
        setSavedKey(apiKey.trim());setKeyStatus("success");
      }else{
        setKeyStatus("error");
      }
    }
  };

  const doAnalyze=useCallback(async()=>{
    if(!savedKey||!channelUrl.trim())return;
    setLoading(true);setError("");setChannel(null);setVideos([]);setAn(null);
    try{
      setProgress("채널 ID 확인 중...");
      const cid=await getChannelId(savedKey,channelUrl);
      setProgress("채널 정보 수집 중...");
      const ch=await getChannelInfo(savedKey,cid);
      setChannel(ch);
      if(!ch.uploadPlaylistId)throw new Error("업로드 플레이리스트를 찾을 수 없어요.");
      const vids=await getAllVideos(savedKey,ch.uploadPlaylistId,setProgress);
      setVideos(vids);
      setProgress("분석 중...");
      setAn(analyze(vids));
      setTab("요약");
    }catch(e){setError(e.message||"분석 중 오류가 발생했어요.");}
    finally{setLoading(false);setProgress("");}
  },[savedKey,channelUrl]);

  const doExport=()=>{
    if(!channel||!an)return;
    const txt=buildTxt(channel,an,[...videos]);
    const a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob([txt],{type:"text/plain;charset=utf-8"}));
    a.download=`${channel.title}_채널분석_${new Date().toISOString().slice(0,10)}.txt`;
    a.click();
  };

  const doVideoAnalyze = async () => {
    const urls = videoUrls.filter(u=>u.trim());
    if(!urls.length){setVideoError("영상 URL을 최소 1개 입력해주세요.");return;}
    setVideoLoading(true);setVideoError("");setVideoResults([]);
    const results=[];
    for(let i=0;i<urls.length;i++){
      try{
        setVideoProgress(`영상 ${i+1}/${urls.length} 스탯 수집 중...`);
        const detail = await fetchVideoDetail(savedKey, urls[i]);
        detail.script = videoScripts[i]||"";
        setVideoProgress(`영상 ${i+1}/${urls.length} 댓글 수집 중...`);
        const comments = await fetchComments(savedKey, detail.id);
        detail.commentAnalysis = analyzeComments(comments);
        detail.rawComments = comments;
        results.push(detail);
      }catch(e){
        results.push({id:"err",title:`오류: ${urls[i]}`,error:e.message,script:videoScripts[i]||""});
      }
    }
    setVideoResults(results);
    setVideoLoading(false);setVideoProgress("");
  };

  const doVideoExport = () => {
    if(!videoResults.length)return;
    const txt = buildVideoTxt(videoResults);
    const a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob([txt],{type:"text/plain;charset=utf-8"}));
    a.download=`영상심층분석_${new Date().toISOString().slice(0,10)}.txt`;
    a.click();
  };

  const sorted=[...videos].sort((a,b)=>{
    if(sortKey==="engRate")return+engRate(b)-+engRate(a);
    if(sortKey==="publishedAt")return new Date(b.publishedAt)-new Date(a.publishedAt);
    return b[sortKey]-a[sortKey];
  });

  return(
    <div style={{padding:"24px 16px",maxWidth:880,margin:"0 auto"}}>

      {/* 헤더 */}
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{fontSize:36,marginBottom:8}}>🐷💰</div>
        <h1 style={{fontSize:22,fontWeight:700,margin:"0 0 4px",background:"linear-gradient(90deg,#fff,#a0a0c0)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>뚱뚱경제 유튜브 채널 분석기</h1>
        <p style={{color:"#505070",fontSize:12}}>쇼츠·롱폼 전체 정밀 분석 → Claude 심층분석용 TXT 내보내기</p>
      </div>

      {/* API 키 */}
      {!savedKey?(
        <div style={C.card}>
          <label style={C.lbl}>🔑 GOOGLE YOUTUBE API KEY</label>
          <div style={{display:"flex",gap:8}}>
            <input style={{...C.inp,fontFamily:"monospace"}} placeholder="AIzaSy..." value={apiKey} onChange={e=>setApiKey(e.target.value)} onKeyDown={e=>e.key==="Enter"&&verifyKey()}/>
            <button style={C.btn()} onClick={verifyKey} disabled={keyStatus==="loading"}>{keyStatus==="loading"?"확인 중...":"확인·저장"}</button>
          </div>
          {keyStatus==="error"&&<div style={{color:"#ef4444",fontSize:12,marginTop:8}}>⚠️ API 키가 유효하지 않아요. 다시 확인해주세요.</div>}
        </div>
      ):(
        <div style={{...C.card,border:"1px solid #10b98133",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{fontSize:12,color:"#10b981"}}>✅ API 키 연결됨</div>
          <button onClick={()=>{setSavedKey("");setKeyStatus(null);}} style={{background:"none",border:"1px solid #2a2a4a",color:"#6060a0",padding:"5px 12px",borderRadius:8,cursor:"pointer",fontSize:11}}>변경</button>
        </div>
      )}

      {/* 채널 URL */}
      {savedKey&&(
        <div style={C.card}>
          <label style={C.lbl}>🔍 분석할 채널 URL</label>
          <div style={{display:"flex",gap:8}}>
            <input style={C.inp} placeholder="https://www.youtube.com/@채널명" value={channelUrl} onChange={e=>setChannelUrl(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doAnalyze()}/>
            <button style={C.btn()} onClick={doAnalyze} disabled={loading}>{loading?"분석 중...":"분석 시작"}</button>
          </div>
          {loading&&<div style={{color:"#f97316",fontSize:12,marginTop:8}}>⏳ {progress}</div>}
          {error&&<div style={{color:"#ef4444",fontSize:12,marginTop:8}}>⚠️ {error}</div>}
        </div>
      )}

      {/* 결과 */}
      {channel&&an&&(
        <>
          {/* 채널 헤더 */}
          <div style={{...C.card,display:"flex",gap:16,alignItems:"center",border:"1px solid #f9731633",flexWrap:"wrap"}}>

            <div style={{flex:1,minWidth:200}}>
              <div style={{fontSize:18,fontWeight:700,color:"#fff",marginBottom:6}}>{channel.title}</div>
              <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
                {[["구독자",channel.subscriberCount.toLocaleString()+"명"],["총 영상",channel.videoCount+"개"],["총 조회",fmtN(channel.viewCount)],["개설",channel.createdAt?.slice(0,10)]].map(([l,v])=>(
                  <div key={l}><span style={{fontSize:10,color:"#505070"}}>{l} </span><span style={{fontSize:13,fontWeight:600,color:"#c0c0d8"}}>{v}</span></div>
                ))}
              </div>
            </div>
            <button style={C.btn("#10b981")} onClick={doExport}>📥 TXT 내보내기</button>
          </div>

          {/* 탭 */}
          <div style={{display:"flex",borderBottom:"1px solid #1e1e3a",marginBottom:20,overflowX:"auto"}}>
            {TABS.map(t=>(
              <button key={t} onClick={()=>setTab(t)} style={{padding:"9px 16px",background:"none",border:"none",cursor:"pointer",fontSize:12,fontWeight:500,whiteSpace:"nowrap",color:tab===t?"#fff":"#505070",borderBottom:tab===t?"2px solid #f97316":"2px solid transparent",marginBottom:-1,transition:"all 0.2s"}}>{t}</button>
            ))}
          </div>

          {/* ── 요약 ── */}
          {tab==="요약"&&(
            <div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:12,marginBottom:16}}>
                {[["분석 영상",an.total+"개","#3b82f6"],["쇼츠",an.shorts.length+"개","#f97316"],["롱폼",an.longs.length+"개","#a855f7"],["평균 조회수",an.avgViews.toLocaleString(),"#10b981"],["평균 참여율",an.avgEngRate+"%","#f59e0b"],["쇼츠 평균뷰",an.avgShortsViews.toLocaleString(),"#f97316"],["롱폼 평균뷰",an.avgLongsViews.toLocaleString(),"#a855f7"],["최고 조회수",an.topByViews[0]?.viewCount.toLocaleString(),"#10b981"]].map(([l,v,c])=>(
                  <div key={l} style={C.stat(c)}>
                    <div style={{fontSize:10,color:"#505070",marginBottom:4}}>{l}</div>
                    <div style={{fontSize:20,fontWeight:700,color:c}}>{v}</div>
                  </div>
                ))}
              </div>

              <div style={C.card}>
                <div style={{fontSize:13,fontWeight:600,color:"#f97316",marginBottom:12}}>🏆 조회수 TOP10</div>
                {an.topByViews.map((v,i)=>(
                  <div key={v.id} style={{display:"flex",gap:10,alignItems:"center",marginBottom:10,paddingBottom:10,borderBottom:i<9?"1px solid #1a1a2a":"none"}}>
                    <span style={{fontSize:16,fontWeight:700,color:"#f97316",width:24}}>{i+1}</span>

                        <span style={{fontSize:11,color:"#10b981"}}>참여율 {engRate(v)}%</span>
                        <span style={{fontSize:11,color:"#6060a0"}}>{v.durationStr}</span>
                        <span style={C.tag(isShorts(v)?"#f97316":"#a855f7")}>{isShorts(v)?"쇼츠":"롱폼"}</span>
                      </div>
                    </div>
                  </div>

              </div>

              <div style={C.card}>
                <div style={{fontSize:13,fontWeight:600,color:"#ef4444",marginBottom:12}}>⚠️ 저조한 영상 BOTTOM5</div>
                {an.bottomByViews.map((v,i)=>(

                    <div style={{flex:1}}>
                      <div style={{fontSize:12,color:"#808090",marginBottom:2,lineHeight:1.4}}>{v.title}</div>
                      <div style={{display:"flex",gap:10}}>
                        <span style={{fontSize:11,color:"#ef4444"}}>👁 {v.viewCount.toLocaleString()}</span>
                        <span style={{fontSize:11,color:"#505070"}}>{v.publishedAt?.slice(0,10)} ({v.dayOfWeek}요일)</span>
                        <span style={C.tag(isShorts(v)?"#f97316":"#a855f7")}>{isShorts(v)?"쇼츠":"롱폼"}</span>
                      </div>
                    </div>
                  </div>
                ))}
              </div>

              <div style={C.card}>
                <div style={{fontSize:13,fontWeight:600,color:"#a855f7",marginBottom:12}}>⭐ 참여율 TOP5</div>
                {an.topEng.slice(0,5).map((v,i)=>(
                  <div key={v.id} style={{display:"flex",gap:10,alignItems:"center",marginBottom:8,paddingBottom:8,borderBottom:i<4?"1px solid #1a1a2a":"none"}}>
                    <span style={{fontSize:16,fontWeight:700,color:"#a855f7",width:24}}>{i+1}</span>
                    <div style={{flex:1}}>
                      <div style={{fontSize:12,color:"#d0d0e8",marginBottom:2,lineHeight:1.4}}>{v.title}</div>
                      <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                        <span style={{fontSize:11,color:"#f59e0b",fontWeight:700}}>참여율 {engRate(v)}%</span>
                        <span style={{fontSize:11,color:"#3b82f6"}}>👁 {v.viewCount.toLocaleString()}</span>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* ── 쇼츠/롱폼 ── */}
          {(tab==="쇼츠"||tab==="롱폼")&&(()=>{
            const list=tab==="쇼츠"?an.shorts:an.longs;
            const s2=[...list].sort((a,b)=>b.viewCount-a.viewCount);
            const avgV=list.length?Math.round(list.reduce((s,v)=>s+v.viewCount,0)/list.length):0;
            const avgE=list.length?(list.reduce((s,v)=>s+parseFloat(engRate(v)),0)/list.length).toFixed(2):"0";
            const c=tab==="쇼츠"?"#f97316":"#a855f7";
            return(
              <div>
                <div style={{display:"flex",gap:12,marginBottom:16,flexWrap:"wrap"}}>
                  {[["영상 수",list.length+"개"],["평균 조회수",avgV.toLocaleString()],["평균 참여율",avgE+"%"],["최고 조회수",s2[0]?.viewCount.toLocaleString()||"0"]].map(([l,v])=>(
                    <div key={l} style={{...C.stat(c),textAlign:"center"}}>
                      <div style={{fontSize:10,color:"#505070",marginBottom:4}}>{l}</div>
                      <div style={{fontSize:18,fontWeight:700,color:c}}>{v}</div>
                    </div>
                  ))}
                </div>
                {s2.map((v,i)=>(
                  <div key={v.id} style={{...C.card,padding:"14px 16px",marginBottom:8}}>
                    <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                      <span style={{fontSize:14,fontWeight:700,color:"#505070",width:24,flexShrink:0,paddingTop:2}}>{i+1}</span>
                      {v.thumbnail&&<img src={v.thumbnail} alt="" style={{width:64,height:36,borderRadius:4,objectFit:"cover",flexShrink:0}}/>}
                      <div style={{flex:1}}>
                        <div style={{fontSize:12,color:"#d0d0e8",marginBottom:6,lineHeight:1.5}}>{v.title}</div>
                        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                          <span style={{fontSize:11,color:"#3b82f6"}}>👁 {v.viewCount.toLocaleString()}</span>
                          <span style={{fontSize:11,color:"#10b981"}}>👍 {v.likeCount.toLocaleString()}</span>
                          <span style={{fontSize:11,color:"#a855f7"}}>💬 {v.commentCount.toLocaleString()}</span>
                          <span style={{fontSize:11,color:"#f59e0b"}}>참여율 {engRate(v)}%</span>
                          <span style={{fontSize:11,color:"#6060a0"}}>{v.durationStr} · {v.publishedAt?.slice(0,10)} ({v.dayOfWeek}요일)</span>
                        </div>
                        {v.tags.length>0&&<div style={{marginTop:6,display:"flex",flexWrap:"wrap",gap:4}}>{v.tags.slice(0,8).map(t=><span key={t} style={C.tag()}>{t}</span>)}</div>}
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            );
          })()}

          {/* ── 제목분석 ── */}
          {tab==="제목분석"&&(
            <div>
              <div style={{display:"flex",gap:12,marginBottom:16,flexWrap:"wrap"}}>
                {[["전체 평균 제목 길이",an.avgTitleLen+"자","#3b82f6"],["쇼츠 평균",an.avgShortsTitleLen+"자","#f97316"],["롱폼 평균",an.avgLongsTitleLen+"자","#a855f7"],["해시태그 포함",an.hashtagVideos.length+"개","#ef4444"]].map(([l,v,c])=>(
                  <div key={l} style={C.stat(c)}>
                    <div style={{fontSize:10,color:"#505070",marginBottom:4}}>{l}</div>
                    <div style={{fontSize:20,fontWeight:700,color:c}}>{v}</div>
                  </div>
                ))}
              </div>
              <div style={C.card}>
                <div style={{fontSize:13,fontWeight:600,color:"#c0c0d8",marginBottom:12}}>📝 전체 제목 자주 쓰인 단어 TOP20</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                  {an.allWords.map(([w,c],i)=>(
                    <div key={w} style={{background:"#1e1e3a",borderRadius:8,padding:"6px 12px",display:"flex",gap:6,alignItems:"center"}}>
                      <span style={{fontSize:10,color:"#505070"}}>{i+1}</span>
                      <span style={{fontSize:13,color:"#e0e0f0",fontWeight:600}}>{w}</span>
                      <span style={{fontSize:11,color:"#3b82f6"}}>{c}회</span>
                    </div>
                  ))}
                </div>
              </div>
              <div style={C.card}>
                <div style={{fontSize:13,fontWeight:600,color:"#f97316",marginBottom:12}}>🏆 조회수 TOP10 영상 제목 패턴 단어</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                  {an.topWords10.map(([w,c],i)=>(
                    <div key={w} style={{background:"#1e1a0a",border:"1px solid #f9731633",borderRadius:8,padding:"6px 12px",display:"flex",gap:6,alignItems:"center"}}>
                      <span style={{fontSize:10,color:"#505070"}}>{i+1}</span>
                      <span style={{fontSize:13,color:"#f97316",fontWeight:600}}>{w}</span>
                      <span style={{fontSize:11,color:"#f59e0b"}}>{c}회</span>
                    </div>

                      <span style={{fontSize:12,color:"#3b82f6",width:30,textAlign:"right"}}>{c}회</span>

              <div style={C.card}>

          )}

          {/* ── 전체목록 ── */}
          {tab==="전체목록"&&(
            <div>
              <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
                <span style={{fontSize:12,color:"#6060a0"}}>정렬:</span>
                {[["viewCount","조회수"],["likeCount","좋아요"],["commentCount","댓글"],["engRate","참여율"],["publishedAt","최신순"]].map(([k,l])=>(
                  <button key={k} onClick={()=>setSortKey(k)} style={{padding:"5px 12px",borderRadius:8,border:"none",cursor:"pointer",fontSize:11,fontWeight:600,background:sortKey===k?"#f97316":"#1e1e3a",color:sortKey===k?"#fff":"#6060a0"}}>{l}</button>
                ))}
                <span style={{fontSize:11,color:"#505070",marginLeft:"auto"}}>{videos.length}개</span>
              </div>
              {sorted.map((v,i)=>(
                <div key={v.id} style={{...C.card,padding:"12px 14px",marginBottom:8}}>
                  <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                    <span style={{fontSize:12,color:"#505070",width:28,flexShrink:0,paddingTop:2}}>{i+1}</span>
                    {v.thumbnail&&<img src={v.thumbnail} alt="" style={{width:60,height:34,borderRadius:4,objectFit:"cover",flexShrink:0}}/>}
                    <div style={{flex:1}}>
                      <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:4,flexWrap:"wrap"}}>
                        <span style={C.tag(isShorts(v)?"#f97316":"#a855f7")}>{isShorts(v)?"쇼츠":"롱폼"}</span>
                        <span style={{fontSize:11,color:"#505070"}}>{v.publishedAt?.slice(0,10)} ({v.dayOfWeek}요일)</span>
                      </div>
                      <div style={{fontSize:12,color:"#d0d0e8",marginBottom:5,lineHeight:1.4}}>{v.title}</div>
                      <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                        <span style={{fontSize:11,color:"#3b82f6"}}>👁 {v.viewCount.toLocaleString()}</span>
                        <span style={{fontSize:11,color:"#10b981"}}>👍 {v.likeCount.toLocaleString()}</span>
                        <span style={{fontSize:11,color:"#a855f7"}}>💬 {v.commentCount.toLocaleString()}</span>
                        <span style={{fontSize:11,color:"#f59e0b"}}>참여율 {engRate(v)}%</span>
                        <span style={{fontSize:11,color:"#6060a0"}}>{v.durationStr}</span>
                      </div>
                      {v.tags.length>0&&<div style={{marginTop:5,display:"flex",flexWrap:"wrap",gap:3}}>{v.tags.slice(0,8).map(t=><span key={t} style={C.tag()}>{t}</span>)}</div>}
                    </div>
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* ── 영상심층분석 ── */}
          {tab==="영상심층분석"&&(
            <div>
              <div style={{...C.card,border:"1px solid #f9731633"}}>
                <div style={{fontSize:13,fontWeight:600,color:"#f97316",marginBottom:4}}>🎬 영상 URL + 대본 입력</div>
                <div style={{fontSize:11,color:"#505070",marginBottom:16}}>벤치마킹할 영상 URL 입력 → 스탯·댓글 자동 수집 | 대본은 유튜브 영상 아래 "..." → "스크립트 열기"에서 복사 붙여넣기</div>
                {videoUrls.map((url,i)=>(
                  <div key={i} style={{marginBottom:16,padding:16,background:"#0a0a1a",borderRadius:10,border:"1px solid #1e1e3a"}}>
                    <div style={{fontSize:11,color:"#6060a0",marginBottom:6}}>영상 {i+1}</div>
                    <input
                      style={{...C.inp,marginBottom:8}}
                      placeholder={`https://www.youtube.com/watch?v=... (영상 ${i+1})`}
                      value={url}
                      onChange={e=>{const a=[...videoUrls];a[i]=e.target.value;setVideoUrls(a);}}
                    />
                    <textarea
                      style={{...C.inp,height:80,resize:"vertical",fontSize:11}}
                      placeholder="여기에 대본(스크립트) 붙여넣기 (선택사항) — 유튜브 영상 아래 '...' → '스크립트 열기' → 전체 복사"
                      value={videoScripts[i]||""}
                      onChange={e=>{const a=[...videoScripts];a[i]=e.target.value;setVideoScripts(a);}}
                    />
                  </div>
                ))}
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  <button style={C.btn()} onClick={doVideoAnalyze} disabled={videoLoading}>
                    {videoLoading?`⏳ ${videoProgress}`:"🔍 분석 시작"}
                  </button>
                  <button style={{...C.btn("#3b82f6")}} onClick={()=>{setVideoUrls([...videoUrls,""]);setVideoScripts([...videoScripts,""]);}} disabled={videoUrls.length>=10}>
                    + 영상 추가
                  </button>
                  {videoResults.length>0&&<button style={C.btn("#10b981")} onClick={doVideoExport}>📥 TXT 내보내기</button>}
                </div>
                {videoError&&<div style={{color:"#ef4444",fontSize:12,marginTop:8}}>⚠️ {videoError}</div>}
              </div>

              {videoResults.map((v,i)=>(
                <div key={i} style={{...C.card,border:v.error?"1px solid #ef444433":"1px solid #3b82f633",marginBottom:12}}>
                  {v.error?(
                    <div style={{color:"#ef4444",fontSize:12}}>❌ {v.title}<br/>{v.error}</div>
                  ):(
                    <>
                      <div style={{display:"flex",gap:12,alignItems:"flex-start",marginBottom:12}}>
                        {v.thumbnail&&<img src={v.thumbnail} alt="" style={{width:80,height:45,borderRadius:6,objectFit:"cover",flexShrink:0}}/>}
                        <div style={{flex:1}}>
                          <div style={{fontSize:14,fontWeight:600,color:"#fff",marginBottom:6,lineHeight:1.4}}>{v.title}</div>
                          <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                            <span style={{fontSize:12,color:"#3b82f6"}}>👁 {v.viewCount.toLocaleString()}</span>
                            <span style={{fontSize:12,color:"#10b981"}}>👍 {v.likeCount.toLocaleString()}</span>
                            <span style={{fontSize:12,color:"#a855f7"}}>💬 {v.commentCount.toLocaleString()}</span>
                            <span style={{fontSize:12,color:"#f59e0b"}}>참여율 {v.viewCount>0?(((v.likeCount+v.commentCount)/v.viewCount)*100).toFixed(2):0}%</span>
                            <span style={{fontSize:12,color:"#6060a0"}}>{fmtDur(v.duration)}</span>
                          </div>
                        </div>
                      </div>

                      {v.tags.length>0&&(
                        <div style={{marginBottom:12}}>
                          <div style={{fontSize:11,color:"#6060a0",marginBottom:6}}>🏷️ 태그</div>
                          <div style={{display:"flex",flexWrap:"wrap",gap:4}}>{v.tags.map(t=><span key={t} style={C.tag()}>{t}</span>)}</div>
                        </div>
                      )}

                      {v.script&&(
                        <div style={{marginBottom:12}}>
                          <div style={{fontSize:11,color:"#6060a0",marginBottom:6}}>📝 대본 ({v.script.length}자)</div>
                          <div style={{background:"#0a0a1a",borderRadius:8,padding:12,fontSize:11,color:"#a0a0c0",lineHeight:1.7,maxHeight:150,overflowY:"auto",whiteSpace:"pre-wrap"}}>{v.script.slice(0,600)}{v.script.length>600?"...":""}</div>
                        </div>
                      )}

                      {v.commentAnalysis&&v.commentAnalysis.total>0&&(
                        <div>
                          <div style={{fontSize:11,color:"#6060a0",marginBottom:8}}>💬 댓글 분석 ({v.commentAnalysis.total}개 수집)</div>
                          <div style={{marginBottom:10}}>
                            <div style={{fontSize:11,color:"#a855f7",marginBottom:6,fontWeight:600}}>👍 좋아요 TOP5 댓글</div>
                            {v.commentAnalysis.top10.slice(0,5).map((c,j)=>(
                              <div key={j} style={{background:"#0a0a1a",borderRadius:6,padding:"8px 12px",marginBottom:6,fontSize:11,color:"#c0c0d8",lineHeight:1.5}}>
                                <span style={{color:"#a855f7",fontWeight:600,marginRight:8}}>👍{c.likeCount}</span>
                                <span dangerouslySetInnerHTML={{__html:c.text.slice(0,150)}}/>
                              </div>
                            ))}
                          </div>
                          <div>
                            <div style={{fontSize:11,color:"#f59e0b",marginBottom:6,fontWeight:600}}>🔑 댓글 자주 나온 키워드 TOP10</div>
                            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                              {v.commentAnalysis.topWords.slice(0,10).map(([w,c])=>(
                                <div key={w} style={{background:"#1a1a0a",border:"1px solid #f59e0b33",borderRadius:8,padding:"4px 10px",display:"flex",gap:6,alignItems:"center"}}>
                                  <span style={{fontSize:12,color:"#f59e0b",fontWeight:600}}>{w}</span>
                                  <span style={{fontSize:10,color:"#505070"}}>{c}회</span>
                                </div>
                              ))}
                            </div>
                          </div>
                        </div>
                      )}
                    </>
                  )}
                </div>
              ))}
            </div>
          )}
        </>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
